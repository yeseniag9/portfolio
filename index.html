<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="main.css" rel="stylesheet">
    <link href="favicon/favicon.png" rel="icon">
    <script src="https://kit.fontawesome.com/eaeedff1d2.js" crossorigin="anonymous"></script>
    <script src="main.js"></script> 
    <title>Yesenia Gonzalez</title>
</head>
<body>  
    <div class="bg"> 
        <nav id="nav" class="container-fluid nav"> 
            <a href="#home" class="text-uppercase name">Yesenia Gonzalez</a>
            <a href="#me"><i class="fa-solid fa-message"></i></a>
        </nav>
        <div id="home" class="intro container d-flex justify-content-start align-items-center">
            <div class="column ms-5 ps-5">
                <section class="hi ms-5 ps-5">
                    <h1 class="intro-text text-uppercase">Hi, I'm Yesenia.</h1>
                </section>  
            </div>
        </div>
    </div> 
    <div id="first" class="me d-flex align-items-center justify-content-center">
        <button type="button" class="btn btn-primary rounded-pill">Check out my resume</button>
    </div>
    <div id="me" class="container message d-flex align-items-center justify-content-center">
        <section class="column">
            <p>Message me.</p>
            <button type="button" class="btn btn-primary btn-sharp">Check out my resume</button>
        </section>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

</html>
