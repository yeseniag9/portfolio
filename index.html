<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="icon" type="png" sizes="16x16" href="favicon/favicon.png">
    <script src="main.js"></script>
    <script src="https://kit.fontawesome.com/eaeedff1d2.js" crossorigin="anonymous"></script>
    <title>Yesenia Gonzalez</title>
</head>
<body>
    <div class="bg"> 
        <nav class="container-fluid nav"> 
            <a href="#home" class="link text-uppercase">Yesenia Gonzalez</a>
            <a href="#me"><i class="fa-solid fa-message"></i></a>
        </nav>
        <div class="intro container d-flex justify-content-start align-items-center">
            <div class="column">
                <section class="hi">
                    <h1 class="text-uppercase line">Hi, I'm Yesenia.</h1>
                </section>  
                <p>I'm a full stack engineer.</p>
                <button type="button" class="btn btn-primary rounded-pil text-uppercase">Find out more</button>
            </div>
        </div>
    </div>
    <div class="me d-flex align-items-center justify-content-center">
        <button type="button" class="btn btn-primary rounded-pill">Check out my resume</button>
    </div>
    <div id="me" class="container message d-flex align-items-center justify-content-center">
        <section class="column">
            <p>Message me.</p>
            <button type="button" class="btn btn-primary btn-sharp ">Check out my resume</button>
        </section>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>
</html>
