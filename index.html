<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="main.css" rel="stylesheet">
    <link href="favicon/favicon.png" rel="icon">
    <script src="https://kit.fontawesome.com/eaeedff1d2.js" crossorigin="anonymous"></script>
    <script src="main.js"></script> 
    <title>Yesenia Gonzalez</title>
</head>
<body>  
    <section class="home"> 
        <div class="else">
            <nav id="nav" class="container-fluid nav"> 
                <div class="dropdown">
                    <a href="#home" class="text-uppercase drop-text">Yesenia Gonzalez</a>
                    <div class="drop-links">
                        <a id="drop1" href="#about" class="drop1">About</a>
                        <a id="drop2" href="#projects" class="drop2">Projects</a>
                    </div>
                </div>
                <a href="#contact">
                    <div id="i">
                        <i class="mt-1 fa-solid fa-message"></i>
                    </div>
                </a>
            </nav>
            <div id="home" class="intro container d-flex align-items-center">
                <div class="column ms-5 ps-5">
                    <div class="ms-5 ps-5">
                        <h1 class="intro-text text-uppercase pb-3">Hi, I'm Yesenia.</h1>
                        <div>
                            <div class="line container d-flex align-items-center"></div>
                            <p class="mt-2 pt-4 pb-3 intro-subtext">I'm a Full Stack Software Engineer with a passion for transforming imaginative concepts into innovative and refined digital solutions.</p>
                            <div class="container d-flex justify-content-center pe-5">
                                <a href="#about"><button class="more-button text-uppercase me-5">Find out more</button></a>
                            </div>
                        </div>
                    </div>  
                </div>
            </div>
        </div> 
    </section> 
    <section id="about" class="about p-5 container-fluid">
        <div class="pe-5 me-5 pt-5">
            <div class="pe-5 me-5">
                <div class="pe-5">
                    <h2 class="text-uppercase pb-2 d-flex justify-content-end pe-5 me-5">Get to know me</h2>
                    <div class="line2"></div>
                    <div class="pe-4 me-1">
                        <div class="pe-5 me-5">
                            <p class="d-flex justify-content-end pe-5 me-5 pt-5 pb-1 about-text">#</p>
                        </div>
                    </div>
                    <div class="d-flex justify-content-end pe-5 me-5 pt-4">
                        <a href="#"><button class="resume-button text-uppercase">Check out my resume</button></a>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <section id="projects" class="projects"></section>
    
    <section id="contact" class="container-fluid d-flex justify-content-center contact">
        <div>
            <h2 class="d-flex justify-content-center">Let's chat.</h2>
            <form>
                <div class="">
                    <div class="name d-inline-block">
                        <label for="name">Name</label>
                        <input class="name2" placeholder="..." type="text" name="name" required="" value="">
                    </div>
                    <div class="email d-inline-block">
                        <label for="email">Email</label>
                        <input class="email2" type="text" name="replyto" required="" value="">
                    </div>
                </div>
                <div class="message">
                    <label for="message">Message</label>
                    <textarea class="message" type="text" name="message" value=""></textarea>
                </div>
                <div>
                    <input class="form-button text-uppercase" type="submit" value="Submit">
                </div>
            </form> 
        </div>
    </section>  

    <section class="container-fluid">
        <footer class="d-flex justify-content-center">
            <a href="https://linkedin.com/in/yesgonzalez/">
                <div class="p-5">
                    <i class="fa-brands fa-linkedin linkedin"></i>
                </div>
            </a>
            <a href="https://github.com/yeseniag9">
                <div class="p-5">
                    <i class="fa-brands fa-github github"></i>
                </div>
            </a>
        </footer>
    </section>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>
</html>
